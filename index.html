<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Te amo piezoza 💖</title>
  
  <!-- Premium Cursive Font (Fredoka & Pacifico) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-color: #ff4d6d;
      --primary-light: #ffccd5;
      --accent-color: #ff7b90;
      --bg-gradient: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
      --card-bg: rgba(255, 255, 255, 0.85);
      --text-color: #4a282d;
      --text-light: #85585f;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Fredoka', sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      padding: 20px;
    }

    /* Fixed full-screen particle layer */
    #particle-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 1;
    }

    /* Floating particles styling */
    .heart-particle {
      position: absolute;
      font-size: 1.5rem;
      pointer-events: none;
      animation: floatUp 3s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
      opacity: 0.8;
      user-select: none;
    }

    .seed-particle {
      position: absolute;
      font-size: 1.2rem;
      pointer-events: none;
      animation: fallDown 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      z-index: 6;
      user-select: none;
    }

    @keyframes floatUp {
      0% {
        transform: translate(0, 0) scale(0.5) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translate(var(--x), var(--y)) scale(var(--scale)) rotate(var(--rotate));
        opacity: 0;
      }
    }

    @keyframes fallDown {
      0% {
        transform: translateY(0) rotate(0deg) scale(0.8);
        opacity: 1;
      }
      100% {
        transform: translateY(120px) rotate(360deg) scale(0.5);
        opacity: 0;
      }
    }

    /* Card Container */
    .card-container {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 40px 30px 35px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 40px rgba(255, 77, 109, 0.15), 
                  inset 0 0 0 2px rgba(255, 255, 255, 0.6);
      text-align: center;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.3s ease;
    }

    .card-container:hover {
      transform: translateY(-2px);
    }

    /* Decorative elements */
    .heart-bg-deco, .star-bg-deco {
      position: absolute;
      pointer-events: none;
      user-select: none;
    }

    .heart-bg-deco {
      top: -25px;
      right: -25px;
      font-size: 3rem;
      animation: floatDecomp 4s ease-in-out infinite alternate;
      opacity: 0.8;
    }

    .star-bg-deco {
      bottom: -20px;
      left: -20px;
      font-size: 2.5rem;
      animation: floatDecomp 3.5s ease-in-out infinite alternate-reverse;
      opacity: 0.8;
    }

    @keyframes floatDecomp {
      0% { transform: translateY(0) rotate(-5deg); }
      100% { transform: translateY(-8px) rotate(10deg); }
    }

    /* Cursive Header Text */
    .header-text {
      font-family: 'Pacifico', cursive;
      font-size: 4rem;
      color: var(--primary-color);
      margin-bottom: 25px;
      text-shadow: 0 3px 6px rgba(255, 77, 109, 0.15);
      animation: heartbeat 2s infinite ease-in-out;
      user-select: none;
      display: inline-block;
      transition: all 0.5s ease;
    }

    .header-text.love-explosion {
      animation: mega-heartbeat 0.6s ease-in-out infinite alternate;
      color: #ff1f4f;
      text-shadow: 0 0 20px rgba(255, 77, 109, 0.6);
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes mega-heartbeat {
      from { transform: scale(1); }
      to { transform: scale(1.15); }
    }

    /* Hamster Play Stage */
    .stage {
      width: 100%;
      height: 200px;
      background: rgba(255, 240, 243, 0.5);
      border-radius: 24px;
      position: relative;
      margin-bottom: 25px;
      overflow: visible;
      border: 1px dashed rgba(255, 77, 109, 0.25);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    /* Speech Dialogue Bubbles */
    .bubble {
      position: absolute;
      background: white;
      color: var(--text-color);
      padding: 8px 12px;
      border-radius: 16px;
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: 0 6px 15px rgba(255, 77, 109, 0.1);
      opacity: 0;
      transform: scale(0.8) translateY(10px);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
      z-index: 10;
      max-width: 130px;
      text-align: center;
    }

    .bubble.show {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    /* Triangle points down for speech bubble */
    .bubble::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 6px 6px 0;
      border-style: solid;
      border-color: white transparent;
      display: block;
      width: 0;
    }

    .bubble-runner {
      top: -15px;
      left: 10px;
    }

    .bubble-zen {
      top: 5px;
      right: 15px;
    }

    /* Spinning Wheel Wrapper */
    .wheel-outer-wrapper {
      position: relative;
      width: 150px;
      height: 150px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wheel-svg-container {
      width: 100%;
      height: 100%;
    }

    #wheel-spinner {
      transform-origin: 80px 80px;
      animation: spin 1.2s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Runner Hamster Positioning */
    .runner-container {
      position: absolute;
      width: 65px;
      height: 65px;
      left: 48px;
      bottom: 8px;
      transform-origin: bottom center;
      z-index: 5;
      pointer-events: none;
    }

    /* Zen Hamster Positioning */
    .zen-container {
      position: relative;
      width: 90px;
      height: 90px;
      transform-origin: bottom center;
      z-index: 5;
      pointer-events: none;
    }

    /* Meme Hamster Images */
    .hamster-meme {
      width: 100%;
      height: 100%;
      background-image: url('hamsters.jpg');
      background-repeat: no-repeat;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: all 0.2s ease;
    }
    
    .runner-meme-pic {
      background-size: 200% 200%;
      background-position: 100% 100%; /* bottom-right: Screaming Hamster */
    }
    
    .zen-meme-pic {
      background-size: 200% 200%;
      background-position: 0% 100%; /* bottom-left: Peace Hamster */
    }

    /* Zen breathing float */
    .zen-breathing {
      animation: zenFloat 3.5s ease-in-out infinite;
    }

    @keyframes zenFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-4px) scale(1.02); }
    }

    /* Runner Trotting (Meme) */
    .running .runner-meme-pic {
      animation: runMeme 0.15s ease-in-out infinite;
    }
    @keyframes runMeme {
      0%, 100% { transform: translateY(0) rotate(-4deg); }
      50% { transform: translateY(-3px) rotate(4deg); }
    }

    /* Runner Chewing (Meme) */
    .chewing .runner-meme-pic {
      animation: chewMeme 0.12s ease-in-out infinite;
      transform-origin: center center;
    }
    @keyframes chewMeme {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.7) scaleX(1.1); }
    }

    /* Controls Panel */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .buttons-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      width: 100%;
    }

    /* Custom Premium Button Design */
    .btn {
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 14px 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 6px 15px rgba(255, 77, 109, 0.25);
      user-select: none;
      width: 100%;
      max-width: 200px;
    }

    .btn-feed {
      background: linear-gradient(135deg, #fcd34d 0%, #f59e0b 100%);
      color: #632d00;
      box-shadow: 0 6px 15px rgba(245, 158, 11, 0.3);
    }

    .btn-feed:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 20px rgba(245, 158, 11, 0.45);
    }

    .btn-feed:active:not(:disabled) {
      transform: translateY(-1px) scale(0.98);
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* Mobile Adaptations */
    @media (max-width: 480px) {
      .card-container {
        padding: 30px 20px 25px;
        max-width: 100%;
      }
      .header-text {
        font-size: 3.2rem;
      }
      .stage {
        height: 180px;
        margin-bottom: 20px;
      }
      .wheel-outer-wrapper {
        width: 130px;
        height: 130px;
      }
      .zen-container {
        width: 75px;
        height: 75px;
      }
      .runner-container {
        width: 52px;
        height: 52px;
        left: 39px;
        bottom: 6px;
      }
      .bubble {
        font-size: 0.75rem;
        max-width: 110px;
        padding: 6px 8px;
      }
      .bubble-runner {
        top: -18px;
        left: 5px;
      }
      .bubble-zen {
        top: 5px;
        right: 10px;
      }
      .btn {
        padding: 12px 20px;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>

  <!-- Floating particles are appended here -->
  <div id="particle-container"></div>

  <!-- Decorative floating symbols behind card -->
  <div class="card-container">
    <div class="heart-bg-deco">💖</div>
    <div class="star-bg-deco">✨</div>

    <!-- Cursive Heading -->
    <h1 class="header-text" id="main-title">Te amo piezoza</h1>

    <!-- Hamster Play Stage -->
    <div class="stage">
      <!-- Dialogue Bubble for Runner Hamster -->
      <div class="bubble bubble-runner" id="bubble-runner">¡Mírame correr! 🐹💨</div>
      
      <!-- Dialogue Bubble for Zen Hamster -->
      <div class="bubble bubble-zen" id="bubble-zen">Paz y semillitas 🌸</div>

      <!-- Left: Wheel containing the runner hamster -->
      <div class="wheel-outer-wrapper" id="wheel-wrapper">
        <div class="wheel-svg-container">
          <!-- Wheel SVG -->
          <svg id="wheel-svg" viewBox="0 0 160 160" width="100%" height="100%">
            <defs>
              <filter id="standShadow" x="-10%" y="-10%" width="120%" height="120%">
                <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.2"/>
              </filter>
            </defs>
            <!-- Stand (Static background) -->
            <g id="wheel-stand" filter="url(#standShadow)">
              <path d="M50,150 L80,80 L110,150" stroke="#7a5c61" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
              <line x1="25" y1="150" x2="135" y2="150" stroke="#7a5c61" stroke-width="8" stroke-linecap="round" />
            </g>
            <!-- Spinning Wheel Part -->
            <g id="wheel-spinner">
              <!-- Outer Rim -->
              <circle cx="80" cy="80" r="70" stroke="#ff7b90" stroke-width="6" fill="none" />
              <circle cx="80" cy="80" r="65" stroke="#ffe4e6" stroke-width="2" stroke-dasharray="4 4" fill="none" />
              
              <!-- Spokes -->
              <line x1="80" y1="80" x2="80" y2="10" stroke="#ff7b90" stroke-width="3" />
              <line x1="80" y1="80" x2="80" y2="150" stroke="#ff7b90" stroke-width="3" />
              <line x1="80" y1="80" x2="10" y2="80" stroke="#ff7b90" stroke-width="3" />
              <line x1="80" y1="80" x2="150" y2="80" stroke="#ff7b90" stroke-width="3" />
              <line x1="80" y1="80" x2="30.5" y2="30.5" stroke="#ff7b90" stroke-width="2" />
              <line x1="80" y1="80" x2="129.5" y2="129.5" stroke="#ff7b90" stroke-width="2" />
              <line x1="80" y1="80" x2="30.5" y2="129.5" stroke="#ff7b90" stroke-width="2" />
              <line x1="80" y1="80" x2="129.5" y2="30.5" stroke="#ff7b90" stroke-width="2" />
              
              <!-- Center Cap -->
              <circle cx="80" cy="80" r="8" fill="#7a5c61" />
              <circle cx="80" cy="80" r="4" fill="#fff" />
            </g>
          </svg>
        </div>

        <!-- Runner Hamster inside wheel (Literal Screaming Hamster Meme) -->
        <div class="runner-container running" id="runner-container">
          <div id="runner-meme" class="hamster-meme runner-meme-pic"></div>
        </div>
      </div>

      <!-- Right: Zen/Peace Hamster (Literal Peace Sign Hamster Meme) -->
      <div class="zen-container zen-breathing" id="zen-container">
        <div id="zen-meme" class="hamster-meme zen-meme-pic"></div>
      </div>
    </div>

    <!-- Controls Panel -->
    <div class="controls">
      <div class="buttons-row">
        <!-- Feed Girasol Button -->
        <button class="btn btn-feed" id="feed-btn">
          <span>🌻</span> Semillita
        </button>
      </div>
    </div>
  </div>

  <script>
    /* Variables & Elements Setup */
    const particleContainer = document.getElementById('particle-container');
    const runnerContainer = document.getElementById('runner-container');
    const zenContainer = document.getElementById('zen-container');
    const wheelWrapper = document.getElementById('wheel-wrapper');
    const wheelSpinner = document.getElementById('wheel-spinner');
    const mainTitle = document.getElementById('main-title');
    
    // Buttons
    const feedBtn = document.getElementById('feed-btn');

    // Speech Bubbles
    const bubbleRunner = document.getElementById('bubble-runner');
    const bubbleZen = document.getElementById('bubble-zen');

    // Audio State
    let audioCtx = null;
    let particleInterval = null;

    // Hamster State
    let activeState = 'running'; // 'running', 'chewing'
    let isSpeedUp = false;

    // Dialogue collections (Meme Hamsters Attitude)
    const runnerPhrases = [
      "¡AAAAAAAAAAAAAAAAHHH! 🏃‍♂️💨",
      "¡ME DA ALGOOOOO! ⚡🏃‍♂️",
      "¡TE AMO PIEZOZAAAA! AAAAAH",
      "¡AUXILIO, CUÁNTO AMOR! 🆘❤️",
      "¡SÁLVAME DE LA RUEDA! 🎡💨"
    ];

    const zenPhrases = [
      "Tranquilo, mi amor, todo va a estar bien ✌️",
      "Respira, loquito lindo... 🌸",
      "¡Qué escándalo! Jajaja 🤭",
      "Paz, amor y V de victoria ✌️✨",
      "Aquí te espero tranquilita... 🤗"
    ];

    /* PARTICLE GENERATOR SYSTEM */
    function spawnParticle(x, y, type = 'heart') {
      const particle = document.createElement('div');
      
      if (type === 'heart') {
        particle.className = 'heart-particle';
        const hearts = ['❤️', '💖', '💝', '💕', '💗'];
        particle.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
      } else if (type === 'seed') {
        particle.className = 'seed-particle';
        particle.innerHTML = '🌻';
      }

      // Physics/Motion Randomizations
      const xOffset = (Math.random() - 0.5) * 120; // x spread
      const yOffset = -(Math.random() * 180 + 120); // float up distance
      const scale = Math.random() * 0.7 + 0.6; // scale factor
      const rotate = (Math.random() - 0.5) * 80; // random rotation

      particle.style.left = `${x}px`;
      particle.style.top = `${y}px`;
      particle.style.setProperty('--x', `${xOffset}px`);
      particle.style.setProperty('--y', `${yOffset}px`);
      particle.style.setProperty('--scale', scale);
      particle.style.setProperty('--rotate', `${rotate}deg`);

      particleContainer.appendChild(particle);

      // Clean up DOM elements after animation completes
      setTimeout(() => {
        particle.remove();
      }, 3000);
    }

    // Auto spawn background floating hearts
    function startAutoHearts() {
      if (particleInterval) clearInterval(particleInterval);
      
      particleInterval = setInterval(() => {
        if (activeState === 'running') {
          // Spawn near bottom center
          const x = window.innerWidth / 2 + (Math.random() - 0.5) * 200;
          const y = window.innerHeight * 0.95;
          spawnParticle(x, y, 'heart');
        }
      }, 1000);
    }

    startAutoHearts();

    /* SPEECH DIALOGUE CONTROLLER */
    let dialogueInterval = null;
    let runnerBubbleTimeout = null;
    let zenBubbleTimeout = null;

    function showDialogue(bubbleElem, text, duration = 3000) {
      bubbleElem.innerHTML = text;
      bubbleElem.classList.add('show');
      
      // Clear previous timeout if exists
      if (bubbleElem === bubbleRunner) {
        clearTimeout(runnerBubbleTimeout);
        runnerBubbleTimeout = setTimeout(() => bubbleElem.classList.remove('show'), duration);
      } else {
        clearTimeout(zenBubbleTimeout);
        zenBubbleTimeout = setTimeout(() => bubbleElem.classList.remove('show'), duration);
      }
    }

    function startRandomDialogues() {
      if (dialogueInterval) clearInterval(dialogueInterval);
      
      dialogueInterval = setInterval(() => {
        if (activeState === 'running') {
          const rand = Math.random();
          if (rand < 0.4) {
            showDialogue(bubbleRunner, runnerPhrases[Math.floor(Math.random() * runnerPhrases.length)]);
          } else if (rand < 0.8) {
            showDialogue(bubbleZen, zenPhrases[Math.floor(Math.random() * zenPhrases.length)]);
          }
        }
      }, 6500);
    }

    startRandomDialogues();

    /* INTERACTION 1: FEED THE HAMSTER */
    feedBtn.addEventListener('click', () => {
      initAudio(); // Initialize audio context on user click for iOS compatibility
      if (activeState !== 'running') return;
      
      activeState = 'chewing';
      feedBtn.disabled = true;

      // Spawn sunflower seed particles falling onto runner
      const runnerRect = runnerContainer.getBoundingClientRect();
      const rx = runnerRect.left + runnerRect.width / 2;
      const ry = runnerRect.top - 50;

      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          spawnParticle(rx + (Math.random() - 0.5) * 30, ry, 'seed');
        }, i * 150);
      }

      // Stop running & change animation to chewing (warp/squeeze)
      runnerContainer.classList.remove('running');
      runnerContainer.classList.add('chewing');
      
      // Slow down wheel rapidly
      wheelSpinner.style.animationDuration = '8s';
      
      // Dialogues
      showDialogue(bubbleRunner, "¡Ooooh! ¿Una semillita? ¡OM NOM NOM NOM! 🌻🐹", 2500);
      showDialogue(bubbleZen, "¡Qué provecho, glotoncito! 🥰", 2500);

      // Play short happy synth sounds for eating
      playChime([659.25, 783.99, 880.00], 100);

      // Finish eating and run SUPER FAST
      setTimeout(() => {
        if (activeState !== 'chewing') return;
        
        activeState = 'running';
        isSpeedUp = true;
        
        runnerContainer.classList.remove('chewing');
        runnerContainer.classList.add('running');
        
        // Super speed wheel
        wheelSpinner.style.animationDuration = '0.35s';
        
        // Scale up slightly to indicate energy
        runnerContainer.style.transform = 'scale(1.05)';
        
        showDialogue(bubbleRunner, "¡WOW! ¡ESTOY LLENO DE ENERGÍA DE AMOR! ⚡🏃‍♂️💨", 3000);
        showDialogue(bubbleZen, "¡Cuidado con la velocidad! 😂💖", 3000);

        // Hearts explosion
        const newRect = runnerContainer.getBoundingClientRect();
        const nx = newRect.left + newRect.width / 2;
        const ny = newRect.top;
        for (let i = 0; i < 15; i++) {
          setTimeout(() => spawnParticle(nx, ny, 'heart'), i * 80);
        }

        // Return to normal speed after 5 seconds
        setTimeout(() => {
          if (activeState === 'running' && isSpeedUp) {
            isSpeedUp = false;
            wheelSpinner.style.animationDuration = '1.2s';
            runnerContainer.style.transform = 'scale(1)';
            feedBtn.disabled = false;
          }
        }, 5000);

      }, 3000);
    });

    /* WEB AUDIO API MUSIC BOX MUSIC SYSTEM */
    // Note frequencies in Hz
    const notes = {
      'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23, 'G4': 392.00, 'A4': 440.00, 'B4': 493.88,
      'C5': 523.25, 'D5': 587.33, 'E5': 659.25, 'F5': 698.46, 'G5': 783.99, 'A5': 880.00, 'B5': 987.77,
      'C6': 1046.50, 'D6': 1174.66, 'E6': 1318.51, 'F6': 1396.91, 'G6': 1567.98
    };

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    // Play a single note with retro music box synthesis (triangle wave + soft reverb/delay sweep)
    function playNote(freq, duration) {
      if (!audioCtx) return;

      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      const filterNode = audioCtx.createBiquadFilter();

      osc.type = 'triangle'; // Sweet woodwind/chime feel
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

      filterNode.type = 'lowpass';
      filterNode.frequency.setValueAtTime(1400, audioCtx.currentTime);

      // Enveloping: Fast attack, slow exponential release decay (music box pluck)
      const now = audioCtx.currentTime;
      gainNode.gain.setValueAtTime(0, now);
      gainNode.gain.linearRampToValueAtTime(0.25, now + 0.03); // dynamic peak
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

      osc.connect(filterNode);
      filterNode.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + duration);
    }

    /* EXTRA AUDIO EFFECTS */
    // Eating seeds chime
    function playChime(frequencyArray, noteGapMs) {
      initAudio();
      if (!audioCtx || audioCtx.state === 'suspended') return;

      frequencyArray.forEach((freq, idx) => {
        setTimeout(() => {
          playNote(freq, 0.4);
        }, idx * noteGapMs);
      });
    }
  </script>
